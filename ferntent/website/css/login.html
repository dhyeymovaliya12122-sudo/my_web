<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div id="header"></div>

    <main>
        <form id="login-form" action="profile.html" method="GET">
            <h2 class="text-center mb-md">Welcome Back</h2>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn w-full">Sign In</button>
            
            <p class="text-center" style="margin-top: 1.5rem;">
                Don't have an account? <a href="register.html" style="color: var(--primary-color);">Create one here</a>.
            </p>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Premium Auto Dealership. All rights reserved.</p>
    </footer>
</body>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
<script>
$(document).ready(function() {
    $("#login-form").validate({
        rules: {
            email: {
                required: true,
                email: true
            },
            password: {
                required: true,
                minlength: 6
            }
        },
        messages: {
            email: {
                required: "Please enter your email address",
                email: "Please enter a valid email address"
            },
            password: {
                required: "Please provide a password",
                minlength: "Your password must be at least 6 characters long"
            }
        },
        submitHandler: function(form) {
            form.submit();
        }
    });
});
</script>
<script src="main.js"></script>
</html>
