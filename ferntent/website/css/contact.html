<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto | Contact Us</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="header"></div>
    <main>
        <form action="index.html" method="GET" class="contact-form">
            <h2 class="text-center mb-md">Get in Touch</h2>
            <p class="text-center contact-subtitle">Have a question about a vehicle or want to schedule a test drive? Send us a message!</p>
            
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="e.g., Test Drive Inquiry" required>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            
            <button type="submit" class="btn w-full">Send Message</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Premium Auto Dealership. All rights reserved.</p>
    </footer>
</body>
<script src="main.js"></script>
</html>
