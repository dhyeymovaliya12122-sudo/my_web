<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motors | Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div id="header-placeholder"></div>

    <main class="container">
        <section class="container-card">
            <div class="container-header">
                <h2>Join Elite Motors</h2>
                <p>Create an account to track orders and save your favorite cars.</p>
            </div>

            <form id="register-form" class="container-form">
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="full-name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat your password" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="terms" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="about.html">Terms & Conditions</a>
                    </label>
                </div>

                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div class="container-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </section>
    </main>

    
    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
    <script>
    $(document).ready(function() {
        $("#register-form").validate({
            rules: {
                "full-name": {
                    required: true,
                    minlength: 3
                },
                email: {
                    required: true,
                    email: true
                },
                password: {
                    required: true,
                    minlength: 6
                },
                "confirm-password": {
                    required: true,
                    minlength: 6,
                    equalTo: "#password"
                },
                terms: {
                    required: true
                }
            },
            messages: {
                "full-name": {
                    required: "Please enter your full name",
                    minlength: "Your name must consist of at least 3 characters"
                },
                email: {
                    required: "Please enter your email address",
                    email: "Please enter a valid email address"
                },
                password: {
                    required: "Please provide a password",
                    minlength: "Your password must be at least 6 characters long"
                },
                "confirm-password": {
                    required: "Please confirm your password",
                    minlength: "Your password must be at least 6 characters long",
                    equalTo: "Please enter the same password as above"
                },
                terms: {
                    required: "Please accept the Terms & Conditions"
                }
            },
            submitHandler: function(form) {
                // If this is a real form submission you can do form.submit()
                // form.submit();
                alert("Registration successful!");
                window.location.href = "login.html";
            }
        });
    });
    </script>
    <script src="main.js"></script>
</body>
</html>
