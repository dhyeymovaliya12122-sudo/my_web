<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motors | Secure Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="header"></div>

    <main class="checkout-wrapper">
        <div class="checkout-container">

            <section class="checkout-form-section">
                <h2>Secure Checkout</h2>

                <form id="payment-form">
                    <div class="form-section">
                        <h3>1. Delivery & Registration Info</h3>
                        <div class="form-group-split">
                            <div class="form-group">
                                <label for="first-name">First Name</label>
                                <input type="text" id="first-name" required placeholder="Enter your first name">
                            </div>
                            <div class="form-group">
                                <label for="last-name">Last Name</label>
                                <input type="text" id="last-name" required placeholder="Enter your last name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">Street Address</label>
                            <input type="text" id="address" required placeholder="Enter your street address">
                        </div>
                        <div class="form-group-split three-way">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" required placeholder="Enter your city">
                            </div>
                            <div class="form-group">
                                <label for="state">State</label>
                                <input type="text" id="state" required placeholder="Enter your state">
                            </div>
                            <div class="form-group">
                                <label for="zip">Zip Code</label>
                                <input type="text" id="zip" required placeholder="Enter your zip code">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>2. Payment Method</h3>
                        <div class="payment-methods">
                            <label class="radio-card selected">
                                <input type="radio" name="payment-type" checked>
                                <span>💳 Credit/Debit Card</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label for="card-name">Name on Card</label>
                            <input type="text" id="card-name" required placeholder="Enter the name on the card">
                        </div>

                        <div class="form-group">
                            <label for="card-number">Card Number</label>
                            <input type="text" id="card-number" required placeholder="Enter your card number"
                                maxlength="19">
                        </div>

                        <div class="form-group-split">
                            <div class="form-group">
                                <label for="expiry">Expiration Date</label>
                                <input type="text" id="expiry" required placeholder="MM/YY" maxlength="5">
                            </div>
                            <div class="form-group">
                                <label for="cvv">CVV</label>
                                <input type="password" id="cvv" required placeholder="Enter the CVV" maxlength="4">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-checkout">Complete Secure Purchase</button>
                </form>
            </section>

            <aside class="checkout-summary-section">
                <div class="summary-card">
                    <h3>Order Summary</h3>
                    <hr>
                    <div id="checkout-items-container">
                    </div>
                    <hr>
                    <div class="totals">
                        <div class="total-row">
                            <span>Document & Dealer Fees</span>
                            <span id="checkout-fees">₹0</span>
                        </div>
                        <div class="total-row">
                            <span>Estimated Tax (18% GST)</span>
                            <span id="checkout-tax">₹0</span>
                        </div>
                        <hr>
                        <div class="total-row grand-total">
                            <span>Total Due Today</span>
                            <span id="checkout-grand-total">₹0</span>
                        </div>
                    </div>
                    <div class="secure-badge">
                        <span>🔒 Secure Checkout</span>
                    </div>
                </div>
            </aside>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Premium Auto Dealership. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>

</html>
