<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto | Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header"></div>

    <main>
        <div class="checkout-wrapper">
            <h2>Your Garage (Cart)</h2>
            <br>
            <div class="checkout-container checkout-single">
                <div class="checkout-form-section">
                    <div class="overflow-auto">
                        <table>
                            <thead>
                                <tr>
                                    <th>Vehicle</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Total</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="cart-tbody">
                           
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="cart-summary mt-md">
                        <h3>Grand Total: <span id="cart-total">₹0.00</span></h3>
                        <br>
                        <a href="payment.html" class="btn btn-checkout w-full text-center">Proceed to Checkout</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Premium Auto Dealership. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
