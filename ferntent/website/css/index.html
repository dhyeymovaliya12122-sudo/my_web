<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header"></div>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h2>Find Your Dream Car Today</h2>
                <p>
                    Explore our vast collection of luxury, sports,
                    and family vehicles.
                </p>
                <a href="showroom.html" class="btn">Browse Showroom</a>
            </div>
        </section>

        <section class="featured">
            <h2>Featured Vehicles</h2>

            <div class="car-grid">
                <div class="car-card">
                    <img src="2025_Harley_Davidson_Sportster_S.jpg" alt="2025 Harley-Davidson Sportster S" class="car-image">
                    <h3>2025 Harley-Davidson Sportster S</h3>
                    <p class="price">₹18.5 lakh</p>
                    <div class="action-group">
                        <a href="details.html?id=8" class="btn text-center">View Details</a>
                        <button class="btn btn-add-cart w-full" data-name="2025 Harley-Davidson Sportster S" data-price="1850000" data-img="https://images.unsplash.com/photo-1558981403-c5f9899a28bc?auto=format&fit=crop&w=800&q=80">Add to Cart</button>
                    </div>
                </div>

                <div class="car-card">
                    <img src="2024_Volvo_S60.jpg" alt="2024 Volvo S60" class="car-image">
                    <h3>2024 Volvo S60</h3>
                    <p class="price">₹48.00 Lakh</p>
                    <div class="action-group">
                        <a href="details.html?id=9" class="btn text-center">View Details</a>
                        <button class="btn btn-add-cart w-full" data-name="2024 Volvo S60" data-price="4800000" data-img="2024_Volvo_S60.jpg">Add to Cart</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Premium Auto Dealership. All rights reserved.</p>
    </footer>

    <script src="./main.js"></script>
</body>
</html>
