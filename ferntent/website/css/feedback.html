<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto | Customer Feedback & Reviews</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header"></div>

    <main class="container">
        <!-- Feedback Statistics -->
        <section>
            <h1 class="text-center mb-lg">Customer Feedback & Reviews</h1>
            <div class="feedback-stats">
                <div class="stat-card">
                    <div class="stat-value" id="total-feedback">0</div>
                    <div class="stat-label">Total Reviews</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avg-rating">0</div>
                    <div class="stat-label">Avg Rating</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="satisfaction">0%</div>
                    <div class="stat-label">Satisfaction</div>
                </div>
            </div>
        </section>

        <!-- Main Feedback Section -->
        <div class="feedback-container">
            <!-- Sidebar Filters -->
            <aside class="feedback-sidebar">
                <h2 class="feedback-sidebar-title">Filters</h2>

                <!-- Rating Filter -->
                <div class="filter-section">
                    <h3>Rating</h3>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-5star" class="rating-filter" value="5">
                        <label for="filter-5star">
                            <span>★★★★★ Excellent</span>
                            <span class="rating-badge" id="count-5">0</span>
                        </label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-4star" class="rating-filter" value="4">
                        <label for="filter-4star">
                            <span>★★★★☆ Good</span>
                            <span class="rating-badge" id="count-4">0</span>
                        </label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-3star" class="rating-filter" value="3">
                        <label for="filter-3star">
                            <span>★★★☆☆ Average</span>
                            <span class="rating-badge" id="count-3">0</span>
                        </label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-2star" class="rating-filter" value="2">
                        <label for="filter-2star">
                            <span>★★☆☆☆ Fair</span>
                            <span class="rating-badge" id="count-2">0</span>
                        </label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-1star" class="rating-filter" value="1">
                        <label for="filter-1star">
                            <span>★☆☆☆☆ Poor</span>
                            <span class="rating-badge" id="count-1">0</span>
                        </label>
                    </div>
                </div>

                <!-- Category Filter -->
                <div class="filter-section">
                    <h3>Category</h3>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-service" class="category-filter" value="Service">
                        <label for="filter-service">Service Quality</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-product" class="category-filter" value="Product">
                        <label for="filter-product">Product Quality</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-delivery" class="category-filter" value="Delivery">
                        <label for="filter-delivery">Delivery</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-support" class="category-filter" value="Support">
                        <label for="filter-support">Customer Support</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="filter-price" class="category-filter" value="Price">
                        <label for="filter-price">Pricing</label>
                    </div>
                </div>

                <!-- Verified Purchase Filter -->
                <div class="filter-section">
                    <h3>Purchase Status</h3>
                    <div class="filter-option">
                        <input type="radio" id="filter-verified" class="purchase-filter" name="purchase" value="verified">
                        <label for="filter-verified">Verified Purchases</label>
                    </div>
                    <div class="filter-option">
                        <input type="radio" id="filter-all" class="purchase-filter" name="purchase" value="all" checked>
                        <label for="filter-all">All Reviews</label>
                    </div>
                </div>

                <!-- Reset Button -->
                <button class="reset-filters" onclick="resetFilters()">Reset Filters</button>
            </aside>

            <!-- Main Content -->
            <section class="feedback-main">
                <!-- Sort Control -->
                <div class="feedback-header">
                    <h2 class="feedback-title">Recent Reviews</h2>
                    <div class="sort-control">
                        <label for="sort-by" class="sort-label">Sort by:</label>
                        <select id="sort-by" onchange="sortFeedback(this.value)">
                            <option value="recent">Most Recent</option>
                            <option value="highest">Highest Rating</option>
                            <option value="lowest">Lowest Rating</option>
                            <option value="helpful">Most Helpful</option>
                        </select>
                    </div>
                </div>

                <!-- Feedback List -->
                <div id="feedback-list"></div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Premium Auto Dealership. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
    <script>
        // Sample feedback data
        const feedbackData = [
            {
                id: 1,
                name: "Rajesh Kumar",
                email: "rajesh@example.com",
                avatar: "RK",
                rating: 5,
                category: "Service",
                verified: true,
                date: "2026-05-15",
                text: "Excellent service! The team was very professional and helped me find the perfect vehicle. Highly recommended!",
                helpful: 24,
                tags: ["Professional", "Quick Process", "Friendly Staff"]
            },
            {
                id: 2,
                name: "Priya Singh",
                email: "priya@example.com",
                avatar: "PS",
                rating: 4,
                category: "Product",
                verified: true,
                date: "2026-05-14",
                text: "Great vehicle quality, though delivery took a bit longer than expected. Overall very satisfied with the purchase.",
                helpful: 18,
                tags: ["Quality", "Delivery", "Satisfied"]
            },
            {
                id: 3,
                name: "Amit Patel",
                email: "amit@example.com",
                avatar: "AP",
                rating: 5,
                category: "Support",
                verified: true,
                date: "2026-05-13",
                text: "Outstanding customer support! They answered all my questions and made the buying process smooth.",
                helpful: 31,
                tags: ["Support", "Responsive", "Helpful"]
            },
            {
                id: 4,
                name: "Neha Sharma",
                email: "neha@example.com",
                avatar: "NS",
                rating: 3,
                category: "Delivery",
                verified: false,
                date: "2026-05-12",
                text: "Good product but delivery was delayed by a week. Could have been handled better.",
                helpful: 12,
                tags: ["Delivery", "Delayed", "Good Product"]
            },
            {
                id: 5,
                name: "Vikram Desai",
                email: "vikram@example.com",
                avatar: "VD",
                rating: 5,
                category: "Price",
                verified: true,
                date: "2026-05-11",
                text: "Fantastic value for money! The pricing is competitive and the vehicle is worth every penny.",
                helpful: 28,
                tags: ["Value", "Pricing", "Worth It"]
            },
            {
                id: 6,
                name: "Ananya Verma",
                email: "ananya@example.com",
                avatar: "AV",
                rating: 2,
                category: "Product",
                verified: true,
                date: "2026-05-10",
                text: "Some minor quality issues. Expected better for the price point. Support team was helpful though.",
                helpful: 9,
                tags: ["Quality", "Issues", "Support Help"]
            }
        ];

        let filteredData = [...feedbackData];
        let activeFilters = {
            ratings: [],
            categories: [],
            verified: null
        };

        // Initialize
        function initFeedback() {
            updateStats();
            renderFeedback();
            addFilterListeners();
        }

        function updateStats() {
            const total = feedbackData.length;
            const avgRating = (feedbackData.reduce((sum, f) => sum + f.rating, 0) / total).toFixed(1);
            const satisfied = Math.round((feedbackData.filter(f => f.rating >= 4).length / total) * 100);

            document.getElementById('total-feedback').textContent = total;
            document.getElementById('avg-rating').textContent = avgRating;
            document.getElementById('satisfaction').textContent = satisfied + '%';

            // Update rating counts
            for (let i = 1; i <= 5; i++) {
                const count = feedbackData.filter(f => f.rating === i).length;
                document.getElementById(`count-${i}`).textContent = count;
            }
        }

        function renderFeedback() {
            const list = document.getElementById('feedback-list');
            list.innerHTML = '';

            if (filteredData.length === 0) {
                list.innerHTML = '<div class="no-results"><p>No feedback matches your filters.</p></div>';
                return;
            }

            filteredData.forEach(feedback => {
                const stars = '★'.repeat(feedback.rating) + '☆'.repeat(5 - feedback.rating);
                const verifiedBadge = feedback.verified ? '<span class="tag">✓ Verified Purchase</span>' : '';
                const tagsHtml = feedback.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

                const card = document.createElement('div');
                card.className = 'feedback-card';
                card.innerHTML = `
                    <div class="feedback-header-inner">
                        <div class="customer-info">
                            <div class="customer-avatar">${feedback.avatar}</div>
                            <div class="customer-details">
                                <h4>${feedback.name}</h4>
                                <p>${new Date(feedback.date).toLocaleDateString()}</p>
                            </div>
                        </div>
                        <div class="stars">${stars}</div>
                    </div>
                    <p class="feedback-text">${feedback.text}</p>
                    <div class="feedback-tags">
                        ${verifiedBadge}
                        <span class="tag">${feedback.category}</span>
                        ${tagsHtml}
                    </div>
                    <div class="feedback-footer">
                        <span>Rating: ${feedback.rating}/5</span>
                        <button class="helpful-btn" onclick="markHelpful(${feedback.id})">👍 Helpful (${feedback.helpful})</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function addFilterListeners() {
            document.querySelectorAll('.rating-filter').forEach(el => {
                el.addEventListener('change', applyFilters);
            });
            document.querySelectorAll('.category-filter').forEach(el => {
                el.addEventListener('change', applyFilters);
            });
            document.querySelectorAll('.purchase-filter').forEach(el => {
                el.addEventListener('change', applyFilters);
            });
        }

        function applyFilters() {
            activeFilters.ratings = Array.from(document.querySelectorAll('.rating-filter:checked')).map(el => parseInt(el.value));
            activeFilters.categories = Array.from(document.querySelectorAll('.category-filter:checked')).map(el => el.value);
            activeFilters.verified = document.getElementById('filter-verified').checked ? true : null;

            filteredData = feedbackData.filter(feedback => {
                const ratingMatch = activeFilters.ratings.length === 0 || activeFilters.ratings.includes(feedback.rating);
                const categoryMatch = activeFilters.categories.length === 0 || activeFilters.categories.includes(feedback.category);
                const verifiedMatch = activeFilters.verified === null || (activeFilters.verified ? feedback.verified : true);

                return ratingMatch && categoryMatch && verifiedMatch;
            });

            renderFeedback();
        }

        function resetFilters() {
            document.querySelectorAll('input[type="checkbox"], input[type="radio"]').forEach(el => {
                if (el.id === 'filter-all') el.checked = true;
                else el.checked = false;
            });
            activeFilters = { ratings: [], categories: [], verified: null };
            filteredData = [...feedbackData];
            renderFeedback();
        }

        function sortFeedback(sortBy) {
            const sorted = [...filteredData];
            switch(sortBy) {
                case 'highest':
                    sorted.sort((a, b) => b.rating - a.rating);
                    break;
                case 'lowest':
                    sorted.sort((a, b) => a.rating - b.rating);
                    break;
                case 'helpful':
                    sorted.sort((a, b) => b.helpful - a.helpful);
                    break;
                case 'recent':
                default:
                    sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
            }
            filteredData = sorted;
            renderFeedback();
        }

        function markHelpful(id) {
            const feedback = feedbackData.find(f => f.id === id);
            if (feedback) {
                feedback.helpful += 1;
                applyFilters();
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initFeedback);
    </script>
</body>
</html>
